name: build latest

on:
  push:
    tags: 
      - latest

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - name: increase build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: checkout
        uses: actions/checkout@v7
        with:
          ref: 'latest'

      - name: login
        run: podman login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: build
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository }}:latest" \
          IMAGE_SOURCE="https://github.com/${{ github.repository }}/tree/latest" \
          make image

      - name: push
        run: podman push ghcr.io/${{ github.repository }}:latest
