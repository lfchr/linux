name: build image and push to ghcr

on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string
      ghcr-user:
        required: true
        type: string
    secrets:
      ghcr_token:
        required: true

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - name: increase build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: checkout
        uses: actions/checkout@v7
        with:
          repository: lfchr/linux
          ref: ${{ inputs.image-tag }}

      - name: login
        run: podman login ghcr.io -u ${{ inputs.ghcr-user }} -p ${{ secrets.ghcr_token }}

      - name: build
        run: |
          IMAGE_NAME="ghcr.io/lfchr/linux:${{ inputs.image-tag }}" \
          make image

      - name: push
        run: podman push ghcr.io/lfchr/linux:${{ inputs.image-tag }}
