# Omit various drivers and modules
# github.com/travier/fedora-atomic-desktops-sealed/issues/23
# github.com/travier/fedora-atomic-desktops-sealed/blob/main/scripts/dracut-config.sh
omit_drivers+=" amdgpu amdxcp radeon nouveau "
omit_drivers+=" ast gud hyperv_drm mgag200 st7571-i2c st7586 st7735r ssd130x vboxvideo vkms vmwgfx "
remove_items+=" /usr/lib/firmware/amdgpu /usr/lib/firmware/radeon "
remove_items+=" /usr/lib/firmware/nvidia "
